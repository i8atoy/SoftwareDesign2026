<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tournament Players</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Format the HLTV images to look like trading cards */
        .player-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            object-position: top;
            background-color: #3e4c54; /* Standard HLTV photo background */
            border-bottom: 3px solid #ffc107; /* A nice accent color for the border */
        }
        .player-card {
            transition: transform 0.2s ease-in-out;
        }
        .player-card:hover {
            transform: translateY(-5px); /* Gentle hover effect */
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="fw-bold m-0">All Players</h1>
        <a th:href="@{/teams}" class="btn btn-outline-primary">View Teams Grid</a>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">

        <div class="col" th:each="player : ${players}">
            <div class="card h-100 shadow-sm border-0 player-card">

                <img th:src="@{${player.photoUrl}}" class="card-img-top player-card-img" th:alt="${player.name}">

                <div class="card-body text-center">
                    <h5 class="card-title fw-bold mb-1" th:text="${player.name}">Player Name</h5>
                    <p class="text-muted small mb-2" th:text="${player.position}">Role</p>

                    <span class="badge bg-secondary rounded-pill" th:text="'Age: ' + ${player.age}">Age: 20</span>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
