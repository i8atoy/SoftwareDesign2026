<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tournament</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-header {
            background-color: #1a1e22;
            color: white;
            padding: 1.5rem;
            text-align: center;
            border-top-left-radius: calc(.25rem - 1px);
            border-top-right-radius: calc(.25rem - 1px);
        }

        .form-card {
            max-width: 600px;
            margin: 0 auto;
        }

        .btn-dark-custom {
            background-color: #1a1e22;
            color: white;
            border: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-dark-custom:hover {
            background-color: #2c3238;
            color: white;
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control:focus {
            border-color: #1a1e22;
            box-shadow: 0 0 0 0.25rem rgba(26, 30, 34, 0.25);
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="mb-4 form-card">
        <a th:href="@{/tournaments}" class="text-decoration-none text-muted fw-bold">
            &larr; Back to Tournaments
        </a>
    </div>

    <div class="card shadow-sm border-0 form-card">

        <div class="form-header">
            <h3 class="mb-0 fw-bold">Create New Tournament</h3>
        </div>

        <div class="card-body p-4 p-md-5">

            <form th:action="@{/tournaments/new}" th:object="${tournament}" method="post">

                <div class="mb-4">
                    <label for="name" class="form-label">Tournament Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control form-control-lg bg-light" placeholder="e.g. IEM Cologne 2024" required autofocus>
                    <p th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1 fw-bold" th:errors="*{name}"></p>
                </div>

                <div class="mb-4">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" id="location" th:field="*{location}" class="form-control form-control-lg bg-light" placeholder="e.g. Cologne, Germany" required>
                    <p th:if="${#fields.hasErrors('location')}" class="text-danger small mt-1 fw-bold" th:errors="*{location}"></p>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="prizeMoney" class="form-label">Prize Money ($)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">$</span>
                            <input type="number" id="prizeMoney" th:field="*{prizeMoney}" step="0.01" class="form-control form-control-lg bg-light border-start-0" placeholder="1000000" required>
                        </div>
                        <p th:if="${#fields.hasErrors('prizeMoney')}" class="text-danger small mt-1 fw-bold" th:errors="*{prizeMoney}"></p>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="vrsPoints" class="form-label">VRS Points</label>
                        <input type="number" id="vrsPoints" th:field="*{vrsPoints}" class="form-control form-control-lg bg-light" placeholder="2400" required>
                        <p th:if="${#fields.hasErrors('vrsPoints')}" class="text-danger small mt-1 fw-bold" th:errors="*{vrsPoints}"></p>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4">
                    <a th:href="@{/tournaments}" class="btn btn-light btn-lg border fw-bold">Cancel</a>
                    <button type="submit" class="btn btn-dark-custom btn-lg px-5">Save Tournament</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
