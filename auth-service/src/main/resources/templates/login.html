<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tournament Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .auth-header {
            background-color: #1a1e22;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }
        .btn-dark-custom {
            background-color: #1a1e22;
            color: white;
            border: none;
        }
        .btn-dark-custom:hover {
            background-color: #2c3238;
            color: white;
        }
        .auth-card {
            max-width: 400px;
            width: 100%;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container d-flex justify-content-center">
    <div class="card auth-card shadow-sm border-0">
        <div class="auth-header">
            <h2 class="fw-bold mb-0">Welcome Back</h2>
            <p class="small text-white-50 mb-0 mt-2">Sign in to manage your tournaments</p>
        </div>

        <div class="card-body p-4">
            <div th:if="${param.error}" class="alert alert-danger small py-2">
                Invalid username or password.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Your username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Your password" required>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">
                        Remember me on this device
                    </label>
                </div>

                <button type="submit" class="btn btn-dark-custom w-100 fw-bold py-2 mb-3">
                    Login
                </button>

                <div class="text-center">
                    <span class="small text-muted">New here?</span>
                    <a th:href="@{/register}" class="small fw-bold text-dark text-decoration-none">Create an account</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
